<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema Escolar CEIPC</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f6f8;
        }
        h1, h2, h3 {
            color: #1d3557;
        }
        nav {
            margin-bottom: 20px;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #0b3d91;
            font-weight: bold;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        input, select, textarea, button {
            display: block;
            width: 100%;
            max-width: 500px;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            background: #1d3557;
            color: white;
            border: none;
            cursor: pointer;
            width: auto;
            padding: 10px 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #1d3557;
            color: white;
        }
        .flash {
            background: #d1fae5;
            border: 1px solid #10b981;
            color: #065f46;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
        }
        .muted {
            color: #666;
        }
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Sistema Escolar CEIPC</h1>

    <nav>
        <a href="/">Início</a>
        <a href="/turmas">Turmas</a>
        <a href="/alunos">Alunos</a>
        <a href="/disciplinas">Disciplinas</a>
        <a href="/notas">Lançar Notas</a>
        <a href="/notas/listar">Ver Notas</a>
    </nav>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
