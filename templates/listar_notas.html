
{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="section-title">Notas simples lançadas</h2>
    <form method="GET" class="inline-form">
        <div>
            <label>Filtrar por turma</label>
            <select name="turma_id">
                <option value="">Todas as turmas</option>
                {% for turma in turmas %}
                <option value="{{ turma.id }}" {% if turma_id == turma.id|string %}selected{% endif %}>
                    {{ turma.nome }} · {{ turma.serie }} · {{ turma.turno }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="actions">
            <button type="submit">Filtrar</button>
        </div>
    </form>
</div>

<div class="card">
    <div class="table-wrap">
        <table>
            <tr>
                <th>Aluno</th>
                <th>Turma</th>
                <th>Disciplina</th>
                <th>Bimestre</th>
                <th>Nota</th>
            </tr>
            {% for item in notas %}
            <tr>
                <td>{{ item.aluno_nome }}</td>
                <td>{{ item.turma_nome }}</td>
                <td>{{ item.disciplina_nome }}</td>
                <td>{{ item.bimestre }}º</td>
                <td>{{ item.nota }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}
