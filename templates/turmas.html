
{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="section-title">Cadastrar turma</h2>
    <form method="POST" class="grid grid-4">
        <div>
            <label>Nome da turma</label>
            <input type="text" name="nome" placeholder="Ex.: Turma A" required>
        </div>
        <div>
            <label>Série</label>
            <input type="text" name="serie" placeholder="Ex.: 5º Ano" required>
        </div>
        <div>
            <label>Turno</label>
            <input type="text" name="turno" placeholder="Ex.: Vespertino" required>
        </div>
        <div>
            <label>Ano letivo</label>
            <input type="text" name="ano_letivo" placeholder="Ex.: 2026" required>
        </div>
        <div class="actions" style="grid-column:1/-1;">
            <button type="submit">Salvar turma</button>
        </div>
    </form>
</div>

<div class="card">
    <h2 class="section-title">Turmas cadastradas</h2>
    <div class="table-wrap">
        <table>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Série</th>
                <th>Turno</th>
                <th>Ano letivo</th>
                <th>Ações</th>
            </tr>
            {% for turma in turmas %}
            <tr>
                <td>{{ turma.id }}</td>
                <td>{{ turma.nome }}</td>
                <td>{{ turma.serie }}</td>
                <td>{{ turma.turno }}</td>
                <td>{{ turma.ano_letivo }}</td>
                <td>
                    <a class="btn btn-secundario" href="{{ url_for('turma_disciplinas', turma_id=turma.id) }}">Disciplinas da turma</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}
