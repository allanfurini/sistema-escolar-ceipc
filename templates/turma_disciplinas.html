
{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="section-title">Disciplinas da turma</h2>
    <p class="subtle">
        <strong>{{ turma.nome }}</strong> · {{ turma.serie }} · {{ turma.turno }} · Ano letivo {{ turma.ano_letivo }}
    </p>
    <form method="POST">
        <div class="grid grid-3">
            {% for disciplina in disciplinas %}
            <label style="display:flex;gap:10px;align-items:center;background:#f7f9fd;border:1px solid var(--borda);padding:12px 14px;border-radius:12px;">
                <input type="checkbox" name="disciplinas" value="{{ disciplina.id }}" {% if disciplina.id in selecionadas %}checked{% endif %} style="width:auto;">
                <span>{{ disciplina.nome }}</span>
            </label>
            {% endfor %}
        </div>
        <div class="actions" style="margin-top:18px;">
            <button type="submit">Salvar disciplinas da turma</button>
            <a href="{{ url_for('turmas') }}" class="btn btn-secundario">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}
