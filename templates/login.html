{% extends "base.html" %}
{% block title %}Login · {{ school_settings.school_subtitle }}{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;margin:40px auto;">
    <h2 class="section-title">Entrar no sistema</h2>
    <p class="subtle">Use seu login para acessar boletins, diários, cadastros e relatórios.</p>
    <form method="POST">
        <div style="margin-bottom:14px;">
            <label>Usuário</label>
            <input type="text" name="username" required>
        </div>
        <div style="margin-bottom:18px;">
            <label>Senha</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">Entrar</button>
    </form><p style="margin-top:14px;"><a href="{{ url_for('recuperar_senha') }}">Esqueci minha senha</a></p>
</div>
{% endblock %}
