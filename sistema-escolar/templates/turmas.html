{% extends "base.html" %}

{% block content %}
<div class="box">
    <h2>Cadastrar Turma</h2>
    <form method="POST">
        <label>Nome da turma</label>
        <input type="text" name="nome" placeholder="Ex.: Turma A" required>

        <label>Série</label>
        <input type="text" name="serie" placeholder="Ex.: 5º Ano" required>

        <label>Turno</label>
        <input type="text" name="turno" placeholder="Ex.: Vespertino" required>

        <label>Ano letivo</label>
        <input type="text" name="ano_letivo" placeholder="Ex.: 2026" required>

        <button type="submit">Salvar turma</button>
    </form>
</div>

<div class="box">
    <h2>Turmas cadastradas</h2>
    <div class="table-wrap">
        <table>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Série</th>
                <th>Turno</th>
                <th>Ano letivo</th>
                <th>Ações</th>
            </tr>
            {% for turma in turmas %}
            <tr>
                <td>{{ turma.id }}</td>
                <td>{{ turma.nome }}</td>
                <td>{{ turma.serie }}</td>
                <td>{{ turma.turno }}</td>
                <td>{{ turma.ano_letivo }}</td>
                <td>
                    <a class="btn btn-secundario" href="/turmas/{{ turma.id }}/disciplinas">Disciplinas da turma</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}
